name: euronyxi-laravel-app
type: laravel
docroot: public  # WICHTIG: Muss "public" sein für Laravel!
php_version: "8.3"  # PHP 8.4 ist noch nicht stabil in DDEV (Stand März 2026)
webserver_type: nginx-fpm
xdebug_enabled: false
no_project_mount: false  # Auf false setzen, sonst wird der Code nicht gemountet!

database:
  type: mariadb
  version: "11.2"  # 11.8 gibt es noch nicht in DDEV (Stand März 2026)

nodejs_version: "20"  # Für Vite/Frontend-Tools
mailpit_version: "v0.6.1"  # Explizite Version für Stabilität
web_environment:
  - APP_URL=https://euronyxi-laravel-app.ddev.site

# Ports für Vite/Livereload (falls benötigt)
web_extra_exposed_ports:
  - name: vite
    container_port: 5173
    http_port: 5173
    https_port: 5174